version: '3'

vars:
  APP_NAME: time4book

tasks:
  build:
    desc: Build the application
    cmds:
      - go build -o bin/{{.APP_NAME}} ./cmd/api

  run:
    desc: Run the application
    cmds:
      - go run -v ./cmd/api

  swag:
    desc: Swag docs init
    cmds:
      - swag init -g cmd/api/main.go

  test:
    desc: Run tests
    cmds:
      - go test ./...

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run

  fmt:
    desc: Format code
    cmds:
      - go fmt ./...

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf bin