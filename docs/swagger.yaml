      companyId:
        type: string
      refreshToken:
        type: string
      status:
        type: boolean
      userId:
        type: string
    type: object
  company.CreateRequest:
    properties:
      address:
        type: string
      industry:
        type: string
      name:
        type: string
      nip:
        type: string
    required:
    - name
